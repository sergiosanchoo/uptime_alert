<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uptime Alert - Acceso</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #1e1e1e; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-top: 4px solid #4ade80; width: 100%; max-width: 350px; text-align: center; }
        .login-box h1 { margin-top: 0; color: #4ade80; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.8rem; }
        .login-box p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #333; background: #121212; color: #fff; box-sizing: border-box; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #4ade80; }
        .btn-submit { width: 100%; padding: 12px; border-radius: 4px; border: none; background: #4ade80; color: #121212; font-weight: bold; font-size: 1rem; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #22c55e; }
        .error-msg { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid #ef4444; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>🟢 Uptime Alert</h1>

    {% if not has_users %}
    <p>Bienvenido. Crea el usuario administrador para acceder al panel por primera vez.</p>
    {% else %}
    <p>Introduce tus credenciales para acceder al panel de control.</p>
    {% endif %}

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        {% if not has_users %}
        <input type="hidden" name="action" value="register">
        {% else %}
        <input type="hidden" name="action" value="login">
        {% endif %}

        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required autocomplete="off" placeholder="Ej: admin">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-submit">
            {% if not has_users %} Registrar y Entrar {% else %} Iniciar Sesión {% endif %}
        </button>
    </form>
</div>

</body>
</html>
